// ======================== SUPABASE ========================
async function carregarDados(){
  const hoje=getHoje();
  for(const c of['duda','fabio','henrique']){
    const res=await sbGet(`Tabela2?consultor=eq.${c}&data=eq.${hoje}`);
    if(Array.isArray(res)&&res.length>0){
      dadosDia[c]=res[0];
    }else{
      const novo={consultor:c,data:hoje,dados_dbug:{m0:0,m1:0,m2:0,m3:0,m4:0,m5:0,m6:0},dados_webi:{m0:0,m1:0,m2:0,m3:0,m4:0,m5:0,m6:0}};
      const criado=await sbPost('Tabela2',novo);
      dadosDia[c]=Array.isArray(criado)?criado[0]:criado;
    }
  }
  renderConteudo();
}

function totalC(c){
  if(!dadosDia[c])return 0;
  const d=dadosDia[c].dados_dbug||{};
  const w=dadosDia[c].dados_webi||{};
  return Object.values(d).reduce((a,b)=>a+b,0)+Object.values(w).reduce((a,b)=>a+b,0);
}
function totalCan(c,can){
  if(!dadosDia[c])return 0;
  const d=can==='dbug'?(dadosDia[c].dados_dbug||{}):(dadosDia[c].dados_webi||{});
  return Object.values(d).reduce((a,b)=>a+b,0);
}

// ======================== ABAS ========================
function trocarAba(aba){
  abaAtiva=aba;
  ['dashboard','duda','fabio','henrique'].forEach(k=>{
    const b=document.getElementById(`tab-${k}`);
    if(!b)return;
    b.className=k===aba
      ?'px-5 py-2.5 rounded-2xl font-medium text-sm bg-violet-600 text-white transition-colors'
      :'px-5 py-2.5 rounded-2xl bg-zinc-800 text-zinc-400 hover:bg-zinc-700 font-medium text-sm transition-colors';
  });
  if(aba!=='dashboard')canalAtivo='dbug';
  renderConteudo();
}

function renderConteudo(){
  const el=document.getElementById('conteudo');
  if(abaAtiva==='dashboard') el.innerHTML=renderDashboard();
  else el.innerHTML=renderConsultor(abaAtiva);
}

          <span class="text-xs text-violet-400 font-medium bg-violet-500/20 px-2 py-1 rounded-lg">${ord} de ${total}</span>
        </div>
      </div>
      <p class="text-xs text-zinc-400 whitespace-pre-wrap leading-relaxed">${txt}</p>
      <div class="flex gap-2">
        <button onclick="copiarMsg('${c}',${i})"
          class="flex-1 bg-zinc-700 hover:bg-emerald-600 text-white text-sm font-medium py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
          <i class="fas fa-copy"></i> Copiar e avançar variação
        </button>
        <button onclick="decrementar('${c}',${i})" class="bg-zinc-700 hover:bg-red-500/20 text-zinc-400 hover:text-red-400 px-4 py-3 rounded-xl transition-colors">
          <i class="fas fa-minus text-xs"></i>
        </button>
      </div>
    </div>`;
  }).join('');

  return`
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-zinc-900 rounded-3xl p-6 text-center">
        <p class="text-xs text-zinc-500 mb-2">Total Hoje</p>
        <p class="text-5xl font-bold text-violet-400">${tD+tW}</p>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-6">
        <p class="text-xs text-violet-400 font-semibold mb-2">DBUG Telecom — ${tD}</p>
        <p class="text-xs text-zinc-500 leading-relaxed">${LABELS.map((l,i)=>dD[`m${i}`]>0?`${dD[`m${i}`]}x ${l}`:null).filter(Boolean).join(' · ')||'—'}</p>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-6">
        <p class="text-xs text-sky-400 font-semibold mb-2">WebiFibra — ${tW}</p>
        <p class="text-xs text-zinc-500 leading-relaxed">${LABELS.map((l,i)=>dW[`m${i}`]>0?`${dW[`m${i}`]}x ${l}`:null).filter(Boolean).join(' · ')||'—'}</p>
      </div>
    </div>
    <div class="bg-zinc-900 rounded-3xl p-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold">Mensagens — ${NOMES[c]}</h2>
        <div class="flex gap-2">
          <button onclick="trocarCanal('dbug')" id="btn-dbug"
            class="${canalAtivo==='dbug'?'bg-violet-600 text-white':'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'} px-4 py-2 rounded-xl text-sm font-medium transition-colors">
            WhatsApp DBUG <span class="ml-1 text-xs opacity-70">${tD}</span>
          </button>
          <button onclick="trocarCanal('webi')" id="btn-webi"
            class="${canalAtivo==='webi'?'bg-sky-600 text-white':'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'} px-4 py-2 rounded-xl text-sm font-medium transition-colors">
            WhatsApp WebiFibra <span class="ml-1 text-xs opacity-70">${tW}</span>
          </button>
        </div>
      </div>
      <div class="space-y-4">${msgCards}</div>
    </div>`;
}

// ======================== COPIAR / DECREMENTAR ========================
async function copiarMsg(c,i){
  const chave=`${c}_${canalAtivo}`;
  if(!variacoes[chave])variacoes[chave]={};
  const vi=variacoes[chave][i]||0;
  const msgs=getMsgs(c,canalAtivo);
  navigator.clipboard.writeText(msgs[i].variacoes[vi]).catch(()=>{});
  variacoes[chave][i]=(vi+1)%msgs[i].variacoes.length;
  localStorage.setItem('var_v2',JSON.stringify(variacoes));
  // incrementar no supabase
  const campo=canalAtivo==='dbug'?'dados_dbug':'dados_webi';
  const dados={...(dadosDia[c]?.[campo]||{})};
  dados[`m${i}`]=(dados[`m${i}`]||0)+1;
  dadosDia[c][campo]=dados;
  await sbPatch('Tabela2',`id=eq.${dadosDia[c].id}`,{[campo]:dados});
  renderConteudo();
  // flash
  setTimeout(()=>{
    const el=document.getElementById(`card-${c}-${i}`);
    if(el){el.classList.add('copy-flash');setTimeout(()=>el.classList.remove('copy-flash'),400);}
  },10);
}

async function decrementar(c,i){
  const campo=canalAtivo==='dbug'?'dados_dbug':'dados_webi';
  const dados={...(dadosDia[c]?.[campo]||{})};
  if((dados[`m${i}`]||0)<=0)return;
  dados[`m${i}`]--;
  dadosDia[c][campo]=dados;
  await sbPatch('Tabela2',`id=eq.${dadosDia[c].id}`,{[campo]:dados});
  renderConteudo();
}

function trocarCanal(canal){
  canalAtivo=canal;
  renderConteudo();
}

// ======================== CIDADES ========================
function adicionarCidade(){
  const cidade=document.getElementById('inp-cidade')?.value.trim();
  const empresa=document.getElementById('inp-empresa')?.value;
  if(!cidade)return;
  disparosCidades.push({id:Date.now().toString(),cidade,empresa});
  localStorage.setItem('cidades_v2',JSON.stringify(disparosCidades));
  document.getElementById('inp-cidade').value='';
  renderConteudo();
}
function removerCidade(id){
  disparosCidades=disparosCidades.filter(d=>d.id!==id);
  localStorage.setItem('cidades_v2',JSON.stringify(disparosCidades));
  renderConteudo();
}
function limparCidades(){
  disparosCidades=[];
  localStorage.setItem('cidades_v2',JSON.stringify(disparosCidades));
  renderConteudo();
}
function onDS(e,id){dragId=id;e.currentTarget.style.opacity='0.4';}
function onDO(e){e.preventDefault();}
function onDP(e,tid){
  e.preventDefault();if(dragId===tid)return;
  const si=disparosCidades.findIndex(d=>d.id===dragId);
  const ti=disparosCidades.findIndex(d=>d.id===tid);
  if(disparosCidades[si].empresa!==disparosCidades[ti].empresa){renderConteudo();return;}
  const[m]=disparosCidades.splice(si,1);
  disparosCidades.splice(ti,0,m);
  localStorage.setItem('cidades_v2',JSON.stringify(disparosCidades));
  renderConteudo();
}

// ======================== HISTÓRICO ========================
async function abrirHistorico(){document.getElementById('hist-modal').classList.remove('hidden');await renderHistorico();}
function fecharHistorico(){document.getElementById('hist-modal').classList.add('hidden');}
async function filtrarHist(f){
  histFiltro=f;
  ['todos','duda','fabio','henrique'].forEach(k=>{
    const b=document.getElementById(`hf-${k}`);
    if(b)b.className=k===f?'px-3 py-1.5 rounded-xl text-xs font-medium bg-violet-600 text-white':'px-3 py-1.5 rounded-xl text-xs font-medium bg-zinc-800 text-zinc-400 hover:bg-zinc-700';
  });
  await renderHistorico();
}
async function renderHistorico(){
  const c=document.getElementById('hist-lista');
  c.innerHTML='<p class="text-zinc-500 text-sm text-center">Carregando...</p>';
  const f=histFiltro==='todos'?'':'consultor=eq.'+histFiltro+'&';
  const dados=await sbGet(`Tabela2?${f}order=data.desc&limit=60`);
  if(!Array.isArray(dados)||!dados.length){c.innerHTML='<p class="text-zinc-600 text-sm italic text-center">Sem histórico ainda.</p>';return;}
  c.innerHTML=dados.map(dia=>{
    const d=dia.dados_dbug||{};const w=dia.dados_webi||{};
    const tD=Object.values(d).reduce((a,b)=>a+b,0);
    const tW=Object.values(w).reduce((a,b)=>a+b,0);
    return`<div class="bg-zinc-800 rounded-2xl p-5">
      <div class="flex justify-between items-center mb-3">
        <div><span class="text-sm font-semibold">${dia.data}</span><span class="text-xs text-zinc-500 ml-2">${NOMES[dia.consultor]||dia.consultor}</span></div>
        <span class="text-lg font-bold text-violet-400">${tD+tW} disparos</span>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div class="bg-zinc-700/50 rounded-xl p-3">
          <p class="text-xs text-violet-400 font-semibold mb-2">DBUG — ${tD}</p>
          ${LABELS.map((l,i)=>d[`m${i}`]>0?`<div class="flex justify-between text-xs text-zinc-400 py-0.5"><span>${l}</span><span class="font-bold text-zinc-300">${d[`m${i}`]}</span></div>`:'').join('')||'<p class="text-xs text-zinc-600">—</p>'}
        </div>
        <div class="bg-zinc-700/50 rounded-xl p-3">
          <p class="text-xs text-sky-400 font-semibold mb-2">WebiFibra — ${tW}</p>
          ${LABELS.map((l,i)=>w[`m${i}`]>0?`<div class="flex justify-between text-xs text-zinc-400 py-0.5"><span>${l}</span><span class="font-bold text-zinc-300">${w[`m${i}`]}</span></div>`:'').join('')||'<p class="text-xs text-zinc-600">—</p>'}
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('hist-modal').addEventListener('click',function(e){if(e.target===this)fecharHistorico();});
window.onload=()=>carregarDados();
</script>
